<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tuỳ chỉnh hành trình – LữHành</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .drag-info {
      margin: 0 var(--s5) var(--s3);
      padding: var(--s3) var(--s4);
      background: var(--primary-50);
      border-radius: var(--r-lg);
      border: 1px solid var(--primary-100);
      display: flex; align-items: center; gap: var(--s3);
      font-size: 13px; color: var(--primary-600); font-weight: 500;
    }
    .day-section { margin-bottom: var(--s3); }
    .day-section-header {
      padding: var(--s3) var(--s5);
      background: var(--neutral-100);
      border-top: 1px solid var(--neutral-200);
      border-bottom: 1px solid var(--neutral-200);
      font-size: 13px; font-weight: 700; color: var(--neutral-600);
      display: flex; align-items: center; gap: var(--s2);
    }

    .edit-item.dragging {
      opacity: .5;
      background: var(--primary-50);
    }
    .edit-item.drag-over {
      border-top: 2px solid var(--primary-500);
    }

    /* Add stop modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: var(--t-base);
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-sheet {
      background: var(--white);
      border-radius: var(--r-2xl) var(--r-2xl) 0 0;
      padding: var(--s4) 0;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(40px);
      transition: var(--t-base);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--neutral-300);
      border-radius: var(--r-full);
      margin: 0 auto var(--s4);
    }
    .modal-title { font-size: 17px; font-weight: 700; padding: 0 var(--s5) var(--s3); }
    .poi-item {
      display: flex; align-items: center; gap: var(--s3);
      padding: var(--s3) var(--s5);
      border-bottom: 1px solid var(--neutral-100);
      cursor: pointer;
      transition: var(--t-fast);
    }
    .poi-item:hover { background: var(--primary-50); }
    .poi-item-icon { font-size: 22px; }
    .poi-item-name { font-size: 15px; font-weight: 600; color: var(--neutral-800); }
    .poi-item-type { font-size: 12px; color: var(--neutral-400); }
    .poi-item-add {
      margin-left: auto;
      width: 28px; height: 28px;
      border-radius: var(--r-full);
      background: var(--primary-600);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-wrapper">
      <nav class="top-nav fade-up">
        <a href="step4.html" class="btn-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7"/></svg>
        </a>
        <span class="nav-title">Tuỳ chỉnh hành trình</span>
        <span class="nav-step">5/6</span>
      </nav>

      <div class="progress-bar-wrap fade-up fade-up-1">
        <div class="progress-segment done"></div>
        <div class="progress-segment done"></div>
        <div class="progress-segment done"></div>
        <div class="progress-segment done"></div>
        <div class="progress-segment active"></div>
        <div class="progress-segment"></div>
      </div>

      <div class="scroll-content" id="main-content">
        <div class="section-header fade-up fade-up-2">
          <h2>Sắp xếp lịch trình 🗂️</h2>
          <p>Kéo để đổi thứ tự · Nhấn ✕ để xoá · Thêm điểm mới</p>
        </div>

        <div class="drag-info fade-up fade-up-2">
          <span>💡</span>
          Kéo thả để thay đổi thứ tự các điểm tham quan
        </div>

        <div id="itinerary-editor"></div>

        <div style="height:100px"></div>
      </div>

      <div class="bottom-cta">
        <button class="btn-primary" onclick="goNext()">
          Tạo kế hoạch cuối cùng ✨
        </button>
      </div>
    </div>
  </div>

  <!-- Add stop modal -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Thêm điểm tham quan 📍</div>
      <div id="poi-list"></div>
    </div>
  </div>

  <script>
    const state = JSON.parse(sessionStorage.getItem('tripState') || '{}');
    const days  = state.days || 3;

    // POI database
    const ALL_POI = {
      'Ninh Bình': [
        { name:'Tràng An',     icon:'⛩️', type:'Di tích - Thuyền' },
        { name:'Hang Múa',     icon:'🏔️', type:'Núi đá - Ngắm cảnh' },
        { name:'Tam Cốc',      icon:'🚣', type:'Sông - Thuyền' },
        { name:'Chùa Bái Đính',icon:'🛕', type:'Chùa - Tâm linh' },
        { name:'Vân Long',     icon:'🌿', type:'Đầm nước - Tự nhiên' },
        { name:'Cúc Phương',   icon:'🦋', type:'Rừng quốc gia' },
        { name:'Hang Bụt',     icon:'🏝️', type:'Hang động' },
      ],
      'Huế': [
        { name:'Đại Nội',       icon:'🏯', type:'Cố đô - Lịch sử' },
        { name:'Chùa Thiên Mụ',icon:'🛕', type:'Chùa - Tâm linh' },
        { name:'Đầm Lập An',   icon:'🌊', type:'Đầm - Thiên nhiên' },
        { name:'Lăng Tự Đức',  icon:'🌺', type:'Lăng tẩm - Lịch sử' },
        { name:'Chợ Đông Ba',  icon:'🛒', type:'Chợ - Ẩm thực' },
        { name:'Phá Tam Giang',icon:'🚤', type:'Đầm phá - Du thuyền' },
      ],
      'default': [
        { name:'Bãi biển',    icon:'🏖️', type:'Biển - Nghỉ dưỡng' },
        { name:'Chợ địa phương',icon:'🛒', type:'Ẩm thực - Văn hóa' },
        { name:'Núi / Đồi',   icon:'⛰️', type:'Trekking - Ngắm cảnh' },
        { name:'Chùa / Đền',  icon:'🛕', type:'Tâm linh - Văn hóa' },
        { name:'Thác nước',   icon:'💧', type:'Thiên nhiên' },
      ]
    };

    function getStops() {
      const to = state.to || '';
      for (const [key, val] of Object.entries(ALL_POI)) {
        if (key !== 'default' && to.toLowerCase().includes(key.toLowerCase())) return val;
      }
      return ALL_POI.default;
    }

    const poiList = getStops();
    // Build itinerary distributed across days
    let itinerary = []; // array of {dayNum, items:[]}

    function initItinerary() {
      const stopsPerDay = Math.max(2, Math.ceil(poiList.length / days));
      for (let d = 1; d <= days; d++) {
        const dayItems = [];
        // Add departure
        if (d === 1) dayItems.push({ id: uid(), icon:'🚗', name:'Xuất phát từ ' + (state.from || 'Hà Nội'), type:'Khởi hành', fixed: true });

        // Add POIs for this day
        const startIdx = (d - 1) * stopsPerDay;
        const endIdx   = Math.min(startIdx + stopsPerDay, poiList.length);
        poiList.slice(startIdx, endIdx).forEach(p => {
          dayItems.push({ id: uid(), ...p });
        });

        // Add lunch
        dayItems.push({ id: uid(), icon:'🍽️', name:'Ăn trưa', type:'Ăn uống' });

        // Add hotel last day
        if (d < days) dayItems.push({ id: uid(), icon:'🏨', name:'Nhận phòng khách sạn', type:'Lưu trú' });
        if (d === days) dayItems.push({ id: uid(), icon:'🏠', name:'Về nhà', type:'Kết thúc', fixed: true });

        itinerary.push({ dayNum: d, items: dayItems });
      }
    }

    function uid() { return Math.random().toString(36).slice(2,8); }

    function render() {
      const el = document.getElementById('itinerary-editor');
      el.innerHTML = '';

      itinerary.forEach(day => {
        const section = document.createElement('div');
        section.className = 'day-section';
        section.innerHTML = `<div class="day-section-header">
          <span style="background:var(--primary-600);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${day.dayNum}</span>
          Ngày ${day.dayNum}
        </div>`;

        const list = document.createElement('div');
        list.dataset.day = day.dayNum;

        day.items.forEach(item => {
          const row = document.createElement('div');
          row.className = 'edit-item';
          row.draggable = !item.fixed;
          row.dataset.id = item.id;
          row.dataset.day = day.dayNum;

          row.innerHTML = `
            <span class="drag-handle">${item.fixed ? '' : '⠿'}</span>
            <span class="edit-item-icon">${item.icon}</span>
            <div class="edit-item-info">
              <div class="edit-item-name">${item.name}</div>
              <div class="edit-item-time">${item.type}</div>
            </div>
            ${item.fixed ? '' : `<button class="edit-item-del" onclick="deleteItem('${item.id}',${day.dayNum})">✕</button>`}
          `;

          // Drag events
          row.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', JSON.stringify({ id: item.id, srcDay: day.dayNum }));
            row.classList.add('dragging');
          });
          row.addEventListener('dragend', () => row.classList.remove('dragging'));
          row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
          row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
          row.addEventListener('drop', e => {
            e.preventDefault();
            row.classList.remove('drag-over');
            const { id, srcDay } = JSON.parse(e.dataTransfer.getData('text/plain'));
            moveItem(id, srcDay, item.id, day.dayNum);
          });

          list.appendChild(row);
        });

        // Add stop button
        const addBtn = document.createElement('button');
        addBtn.className = 'add-stop-btn';
        addBtn.innerHTML = `<span style="font-size:18px;background:var(--primary-100);color:var(--primary-600);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center">+</span>Thêm điểm vào Ngày ${day.dayNum}`;
        addBtn.onclick = () => openModal(day.dayNum);
        list.appendChild(addBtn);

        section.appendChild(list);
        el.appendChild(section);
      });
    }

    function deleteItem(id, dayNum) {
      const day = itinerary.find(d => d.dayNum === dayNum);
      day.items = day.items.filter(i => i.id !== id);
      render();
    }

    function moveItem(id, srcDay, targetId, tgtDay) {
      const src = itinerary.find(d => d.dayNum === srcDay);
      const tgt = itinerary.find(d => d.dayNum === tgtDay);
      const item = src.items.find(i => i.id === id);
      if (!item) return;
      src.items = src.items.filter(i => i.id !== id);
      const tgtIdx = tgt.items.findIndex(i => i.id === targetId);
      tgt.items.splice(tgtIdx, 0, item);
      render();
    }

    let modalDay = null;
    function openModal(dayNum) {
      modalDay = dayNum;
      const list = document.getElementById('poi-list');
      list.innerHTML = poiList.map(p => `
        <div class="poi-item" onclick="addStop('${p.name}','${p.icon}','${p.type}')">
          <span class="poi-item-icon">${p.icon}</span>
          <div>
            <div class="poi-item-name">${p.name}</div>
            <div class="poi-item-type">${p.type}</div>
          </div>
          <span class="poi-item-add">+</span>
        </div>
      `).join('');
      document.getElementById('modal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
    }

    function addStop(name, icon, type) {
      const day = itinerary.find(d => d.dayNum === modalDay);
      // insert before last item
      const lastIdx = day.items.length - 1;
      day.items.splice(lastIdx, 0, { id: uid(), name, icon, type });
      document.getElementById('modal').classList.remove('open');
      render();
    }

    function goNext() {
      const s = JSON.parse(sessionStorage.getItem('tripState') || '{}');
      s.itinerary = itinerary;
      sessionStorage.setItem('tripState', JSON.stringify(s));
      window.location.href = 'step6.html';
    }

    initItinerary();
    render();
  </script>
</body>
</html>
